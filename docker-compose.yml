version: '3.8'

services:
  db:
    image: postgres:10-alpine
    container_name: postgres_odoo15_n9
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    ports:
      - "5431:5432"
    volumes:
      - odoo15_pgdata:/var/lib/postgresql/data

volumes:
  odoo15_pgdata: